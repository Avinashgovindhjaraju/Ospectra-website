<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Ospectra</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* Minimal styling for demo, reuse Login styles if needed */
    .auth-card { max-width: 440px; margin: 40px auto; background: #181848; border-radius: 20px; padding: 40px; color: #fff; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; }
    .btn-submit { width: 100%; padding: 12px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .alert { margin-bottom: 16px; color: #f87171; display: none; }
    .alert.success { color: #4ade80; }
    .switch-link { text-align: center; margin-top: 20px; }
    .switch-link a { color: #a855f7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Sign Up</h2>
    <div class="alert" id="alert"></div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required>
    </div>
    <div class="form-group">
      <label for="age">Age</label>
      <input type="number" id="age" min="1" required>
    </div>
    <button class="btn-submit" onclick="handleSignup()">Sign Up</button>
    <div class="switch-link">Already have an account? <a href="Login.html">Login</a></div>
  </div>
  <script>
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + (type === 'success' ? 'success' : '');
      el.style.display = 'block';
    }
    function hideAlert() {
      const el = document.getElementById('alert');
      el.style.display = 'none';
    }
    async function handleSignup() {
      hideAlert();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const age = document.getElementById('age').value;
      if (!email || !password || !age) {
        showAlert('All fields are required.');
        return;
      }
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, password, age })
        });
        const data = await res.json();
        if (data.success) {
          // Auto-login after sign up
          localStorage.setItem('ospectra_user', JSON.stringify({ username: email, age: age }));
          showAlert('Sign up successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else if (data.message && data.message.includes('already exists')) {
          // If user exists, log them in automatically
          localStorage.setItem('ospectra_user', JSON.stringify({ username: email }));
          showAlert('Account exists! Logging you in…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else {
          showAlert(data.message);
        }
      } catch (err) {
        showAlert('Network error. Please try again.');
      }
    }
      // If already logged in, redirect to home
      if (localStorage.getItem('ospectra_user')) {
        window.location.href = 'index.html';
      }
  </script>
</body>
</html>
